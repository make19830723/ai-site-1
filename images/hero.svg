<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#93c5fd" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- 光晕 -->
  <circle cx="900" cy="200" r="360" fill="url(#orb)"/>
  <circle cx="200" cy="700" r="300" fill="url(#orb)" opacity="0.6"/>

  <!-- 网格线条（数据感） -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="750" x2="1200" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
  </g>

  <!-- 上升柱状图（增长趋势） -->
  <g fill="#ffffff" fill-opacity="0.85">
    <rect x="120" y="620" width="60" height="180" rx="6"/>
    <rect x="220" y="540" width="60" height="260" rx="6"/>
    <rect x="320" y="470" width="60" height="330" rx="6"/>
    <rect x="420" y="380" width="60" height="420" rx="6"/>
    <rect x="520" y="300" width="60" height="500" rx="6"/>
  </g>

  <!-- 趋势曲线 -->
  <path d="M 150 640 Q 350 540 550 360 T 1050 180"
        fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" filter="url(#blur)"/>
  <path d="M 150 640 Q 350 540 550 360 T 1050 180"
        fill="none" stroke="#fde68a" stroke-width="4" stroke-linecap="round"/>

  <!-- 数据节点 -->
  <g fill="#ffffff">
    <circle cx="150" cy="640" r="10"/>
    <circle cx="350" cy="540" r="10"/>
    <circle cx="550" cy="360" r="12"/>
    <circle cx="750" cy="280" r="12"/>
    <circle cx="950" cy="210" r="14"/>
  </g>

  <!-- 中央抽象 AI 节点网络 -->
  <g transform="translate(780,420)">
    <g stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" fill="none">
      <line x1="0" y1="0" x2="-140" y2="-100"/>
      <line x1="0" y1="0" x2="140" y2="-90"/>
      <line x1="0" y1="0" x2="-120" y2="120"/>
      <line x1="0" y1="0" x2="150" y2="100"/>
      <line x1="0" y1="0" x2="0" y2="-160"/>
      <line x1="-140" y1="-100" x2="0" y2="-160"/>
      <line x1="140" y1="-90" x2="0" y2="-160"/>
      <line x1="-140" y1="-100" x2="-120" y2="120"/>
      <line x1="140" y1="-90" x2="150" y2="100"/>
    </g>
    <g fill="#ffffff">
      <circle cx="0" cy="0" r="26"/>
      <circle cx="-140" cy="-100" r="16"/>
      <circle cx="140" cy="-90" r="16"/>
      <circle cx="-120" cy="120" r="16"/>
      <circle cx="150" cy="100" r="16"/>
      <circle cx="0" cy="-160" r="18"/>
    </g>
    <text x="0" y="7" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#2563eb">AI</text>
  </g>

  <!-- 顶部柔光 -->
  <rect width="1200" height="400" fill="url(#glow)"/>
</svg>
